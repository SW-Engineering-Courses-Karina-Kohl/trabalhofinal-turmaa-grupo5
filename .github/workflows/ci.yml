name: CI

on:
  push:
  pull_request:

jobs:
  maven:
    name: Maven test and package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build WAR
        run: mvn -B package

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: maven

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t food-waste-audit-ci .
